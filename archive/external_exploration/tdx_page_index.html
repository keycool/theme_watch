    <script type="text/javascript">
        // httpå¼ºå¶è·³è½¬https
        (function() {
            var hash = location.hash
            if (hash.indexOf('index') > -1) {
                document.getElementById('index').setAttribute("class", "active")
            } else if (hash.indexOf('zbs') > -1) {
                document.getElementById('zbs').setAttribute("class", "active")
            } else if (hash.indexOf('public') > -1) {
                document.getElementById('public').setAttribute("class", "active")
            } else if (hash.indexOf('bbs') > -1) {
                document.getElementById('bbs').setAttribute("class", "active")
            }
            if (location.href.indexOf('page_proxy') == -1 && getUrlParam().pop != 1) {
                document.getElementsByClassName("app-nav")[0].setAttribute("class", "app-nav")
            }

            function getUrlParam(name) {
                let param = {};
                let url = window.location.href;
                let index = url.indexOf("?");
                if (index == -1) {
                    return param;
                }

                url = url.substr(index + 1);
                let queryArr = url.split("&");
                queryArr.forEach(function(p) {
                    let a = p.split("=");
                    param[a[0]] = a[1];
                })
                if (name) {
                    return param[name]
                }
                return param;
            }
        })();
    </script>
