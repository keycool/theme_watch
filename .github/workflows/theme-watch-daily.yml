name: Theme Watch Daily Update

on:
  workflow_dispatch:
    inputs:
      end_date:
        description: "Trade date in YYYYMMDD. Leave blank to use runner local date."
        required: false
        type: string
      allow_non_trade_day:
        description: "Run even on a non-trading day."
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 12 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      THEME_WATCH_BASE_TOKEN: ${{ secrets.THEME_WATCH_BASE_TOKEN }}
      THEME_WATCH_BASE_IDENTITY: bot
      THEME_WATCH_RUNS_TABLE: tblyVEBVpnLy50k4
      THEME_WATCH_SCAN_TABLE: tblp78QebGDZbot7
      WORKFLOW_END_DATE: ${{ github.event.inputs.end_date || '' }}
      WORKFLOW_ALLOW_NON_TRADE_DAY: ${{ github.event.inputs.allow_non_trade_day || 'false' }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: .cache_scan_v2
          key: theme-watch-cache-v1-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            theme-watch-cache-v1-${{ runner.os }}-${{ github.ref_name }}-
            theme-watch-cache-v1-${{ runner.os }}-

      - name: Install Python dependencies
        run: python -m pip install -r requirements-theme-watch.txt

      - name: Install lark-cli
        run: npm install -g @larksuite/cli@latest

      - name: Configure lark-cli bot profile
        if: env.FEISHU_APP_ID != '' && env.FEISHU_APP_SECRET != '' && env.THEME_WATCH_BASE_TOKEN != ''
        shell: bash
        run: |
          printf '%s' "$FEISHU_APP_SECRET" | lark-cli config init --app-id "$FEISHU_APP_ID" --app-secret-stdin --brand feishu
          lark-cli config default-as bot

      - name: Run theme watch workflow
        shell: bash
        run: |
          args=(python run_theme_watch_workflow.py --trigger-type github_actions)
          if [[ -n "$WORKFLOW_END_DATE" ]]; then
            args+=(--end-date "$WORKFLOW_END_DATE")
          fi
          if [[ "$WORKFLOW_ALLOW_NON_TRADE_DAY" == "true" ]]; then
            args+=(--allow-non-trade-day)
          fi
          if [[ -z "$THEME_WATCH_BASE_TOKEN" || -z "$FEISHU_APP_ID" || -z "$FEISHU_APP_SECRET" ]]; then
            args+=(--skip-sync)
          fi
          "${args[@]}"

      - name: Print workflow debug logs on failure
        if: failure()
        shell: bash
        run: |
          shopt -s nullglob
          for f in logs/theme_watch_workflow/*.json logs/theme_watch_workflow/*.log; do
            echo "===== $f ====="
            cat "$f"
          done

      - name: Upload workflow logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: theme-watch-workflow-logs
          path: logs/theme_watch_workflow

      - name: Upload static report artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: theme-watch-report
          path: reports/theme_watch

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/theme_watch

      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache_scan_v2
          key: theme-watch-cache-v1-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

  deploy:
    if: github.event_name != 'pull_request'
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
