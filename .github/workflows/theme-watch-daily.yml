name: Theme Watch Daily Update

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      end_date:
        description: "Trade date in YYYYMMDD. Leave blank to use previous day on GitHub Actions."
        required: false
        type: string
      allow_non_trade_day:
        description: "Run even on a non-trading day."
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 12 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      run_status: ${{ steps.capture-status.outputs.run_status }}
    env:
      TZ: Asia/Shanghai
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      WORKFLOW_END_DATE: ${{ github.event.inputs.end_date || '' }}
      WORKFLOW_ALLOW_NON_TRADE_DAY: ${{ github.event.inputs.allow_non_trade_day || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: .cache_scan_v2
          key: theme-watch-cache-v1-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            theme-watch-cache-v1-${{ runner.os }}-${{ github.ref_name }}-
            theme-watch-cache-v1-${{ runner.os }}-

      - name: Install Python dependencies
        run: python -m pip install -r requirements-theme-watch.txt

      - name: Run theme watch workflow
        shell: bash
        run: |
          args=(python run_theme_watch_workflow.py --trigger-type github_actions)
          if [[ -n "$WORKFLOW_END_DATE" ]]; then
            args+=(--end-date "$WORKFLOW_END_DATE")
          fi
          if [[ "$WORKFLOW_ALLOW_NON_TRADE_DAY" == "true" ]]; then
            args+=(--allow-non-trade-day)
          fi
          args+=(--skip-sync)
          "${args[@]}"

      - name: Build workbook artifact
        if: always()
        shell: bash
        run: |
          python theme_watch_publish_artifacts.py \
            --summary-dir logs/theme_watch_workflow \
            --scan-csv sw_l2_strategy_scan.csv \
            --output-xlsx logs/theme_watch_workflow/theme_watch_snapshot.xlsx

      - name: Validate generated reports
        if: success()
        run: |
          python theme_watch_validate_reports.py

      - name: Capture workflow status
        if: always()
        id: capture-status
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          summary_dir = Path("logs/theme_watch_workflow")
          latest = sorted(summary_dir.glob("*.json"), key=lambda p: p.stat().st_mtime, reverse=True)[0]
          payload = json.loads(latest.read_text(encoding="utf-8"))
          print(f"run_status={payload.get('status', 'unknown')}")
          print(f"summary_path={latest}")
          PY

      - name: Print workflow debug logs on failure
        if: failure()
        shell: bash
        run: |
          shopt -s nullglob
          for f in logs/theme_watch_workflow/*.json logs/theme_watch_workflow/*.log; do
            echo "===== $f ====="
            cat "$f"
          done

      - name: Upload workflow logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: theme-watch-workflow-logs
          path: |
            logs/theme_watch_workflow
            logs/theme_watch_archive

      - name: Upload static report artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: theme-watch-report
          path: reports/theme_watch

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/theme_watch

      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache_scan_v2
          key: theme-watch-cache-v1-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

  deploy:
    if: github.event_name != 'pull_request' && needs.update.outputs.run_status != 'skipped'
    needs: update
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    if: github.event_name != 'pull_request'
    needs: [update, deploy]
    runs-on: ubuntu-latest
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.Theme_Watch_FEISHU_WEBHOOK_URL }}
      FEISHU_WEBHOOK_SECRET: ${{ secrets.Theme_Watch_FEISHU_WEBHOOK_SECRET }}
      FEISHU_WEBHOOK_KEYWORD: theme_watch
      THEME_WATCH_PAGES_URL: ${{ needs.deploy.outputs.page_url }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download workflow logs
        uses: actions/download-artifact@v4
        with:
          name: theme-watch-workflow-logs
          path: logs/theme_watch_workflow

      - name: Inspect downloaded workflow logs
        run: |
          find logs/theme_watch_workflow -maxdepth 4 -type f | sort

      - name: Send Feishu webhook
        if: env.FEISHU_WEBHOOK_URL != ''
        continue-on-error: true
        run: |
          python theme_watch_feishu_webhook.py --summary-dir logs/theme_watch_workflow

  verify-pages:
    if: github.event_name != 'pull_request' && needs.update.outputs.run_status != 'skipped'
    needs: [update, deploy]
    runs-on: ubuntu-latest
    env:
      THEME_WATCH_PAGES_URL: ${{ needs.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify published site pages
        run: |
          python - <<'PY'
          import os
          import sys
          import time
          import urllib.request

          from theme_watch_config import TOPIC_PAGES

          def fetch_text(url: str) -> str:
              return urllib.request.urlopen(url, timeout=20).read().decode("utf-8", errors="strict")

          def wait_until_ok(label: str, url: str, checker, attempts: int = 12, sleep_seconds: int = 10) -> None:
              last_error = None
              for attempt in range(1, attempts + 1):
                  try:
                      text = fetch_text(url)
                      if checker(text):
                          print(f"{label}_verified={url}")
                          return
                      last_error = f"{label} content not ready"
                  except Exception as exc:
                      last_error = repr(exc)
                  print(f"{label}_retry={attempt}/{attempts} reason={last_error}")
                  time.sleep(sleep_seconds)
              raise SystemExit(f"{label} verification failed after retries: {last_error}")

          base_url = os.environ["THEME_WATCH_PAGES_URL"].rstrip("/")
          homepage_url = f"{base_url}/?v={int(time.time())}"
          wait_until_ok("homepage", homepage_url, lambda html: '<table class="overview-table">' in html)

          checked = 0
          for page in TOPIC_PAGES:
              url = f"{base_url}/pages/{page['output']}?v={int(time.time())}"
              wait_until_ok(
                  page["output"],
                  url,
                  lambda html: '<article class="card">' in html and 'class="sparkline"' in html,
              )
              checked += 1

          print(f"published_topic_pages_verified={checked}")
          PY
