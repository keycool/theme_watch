name: ETF Core Constituent Watch

on:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - ".github/workflows/etf-constituent-daily.yml"
      - "etf_constituent_feishu_webhook.py"
      - "run_etf_constituent_workflow.py"
      - "requirements-etf-constituent.txt"
      - "industry_insight_sandbox/**"
  workflow_dispatch:
    inputs:
      end_date:
        description: "Trade date in YYYYMMDD. Leave blank to select it automatically."
        required: false
        type: string
      allow_non_trade_day:
        description: "Run even when the selected date is not an SSE trading day."
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "5 21 * * 1-5"
      timezone: "Asia/Shanghai"

permissions:
  contents: write

jobs:
  check_data_ready:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      data_ready: ${{ steps.check.outputs.data_ready }}
      end_date: ${{ steps.check.outputs.end_date }}
    env:
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tushare
        run: python -m pip install "tushare>=1.4,<2"

      - name: Check whether Tushare daily data is ready
        id: check
        shell: bash
        run: |
          python - <<'PY' | tee -a "$GITHUB_OUTPUT"
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          import tushare as ts

          token = os.environ.get("TUSHARE_TOKEN", "").strip()
          if not token:
              raise SystemExit("TUSHARE_TOKEN is not configured.")

          target_date = datetime.now(ZoneInfo("Asia/Shanghai")).strftime("%Y%m%d")
          pro = ts.pro_api(token)
          calendar = pro.trade_cal(
              exchange="SSE",
              start_date=target_date,
              end_date=target_date,
              fields="cal_date,is_open",
          )
          if calendar.empty:
              raise SystemExit(f"Trading calendar returned no row for {target_date}.")

          print(f"end_date={target_date}")
          if int(calendar.iloc[0]["is_open"]) != 1:
              print("data_ready=false")
              print("reason=non_trading_day")
              raise SystemExit(0)

          probes = {
              "stock_daily": pro.daily(
                  trade_date=target_date,
                  fields="ts_code,trade_date,close",
              ),
              "tracked_etf": pro.fund_daily(
                  ts_code="512480.SH",
                  start_date=target_date,
                  end_date=target_date,
                  fields="ts_code,trade_date,close",
              ),
              "tracked_index": pro.index_daily(
                  ts_code="931994.CSI",
                  start_date=target_date,
                  end_date=target_date,
                  fields="ts_code,trade_date,close",
              ),
          }
          minimum_rows = {"stock_daily": 1000, "tracked_etf": 1, "tracked_index": 1}
          readiness = {}
          for name, frame in probes.items():
              dates = (
                  set(frame["trade_date"].astype(str))
                  if not frame.empty and "trade_date" in frame
                  else set()
              )
              ready = len(frame) >= minimum_rows[name] and target_date in dates
              readiness[name] = ready
              print(f"{name}_rows={len(frame)}")
              print(f"{name}_ready={str(ready).lower()}")

          data_ready = all(readiness.values())
          print(f"data_ready={str(data_ready).lower()}")
          print("reason=ready" if data_ready else "reason=daily_data_incomplete")
          PY

  calculate-and-verify:
    needs: check_data_ready
    if: >-
      ${{
        always() &&
        (
          github.event_name != 'schedule' ||
          (
            needs.check_data_ready.result == 'success' &&
            needs.check_data_ready.outputs.data_ready == 'true'
          )
        )
      }}
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      WORKFLOW_END_DATE: >-
        ${{
          github.event_name == 'schedule' &&
          needs.check_data_ready.outputs.end_date ||
          github.event.inputs.end_date ||
          ''
        }}
      WORKFLOW_ALLOW_NON_TRADE_DAY: ${{ github.event.inputs.allow_non_trade_day || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: industry_insight_sandbox/package-lock.json

      - name: Restore market data cache
        uses: actions/cache/restore@v4
        with:
          path: industry_insight_sandbox/data/cache
          key: etf-constituent-cache-v1-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            etf-constituent-cache-v1-${{ runner.os }}-${{ github.ref_name }}-
            etf-constituent-cache-v1-${{ runner.os }}-

      - name: Install Python dependencies
        run: python -m pip install -r requirements-etf-constituent.txt

      - name: Install site dependencies
        working-directory: industry_insight_sandbox
        run: npm ci

      - name: Calculate ETF constituent observations
        id: calculate
        shell: bash
        run: |
          args=(python run_etf_constituent_workflow.py --trigger-type github_actions)
          if [[ -n "$WORKFLOW_END_DATE" ]]; then
            args+=(--end-date "$WORKFLOW_END_DATE")
          fi
          if [[ "$WORKFLOW_ALLOW_NON_TRADE_DAY" == "true" ]]; then
            args+=(--allow-non-trade-day)
          fi
          output="$("${args[@]}")"
          printf '%s\n' "$output"
          run_status="$(printf '%s\n' "$output" | awk -F= '$1 == "status" { print $2 }' | tail -n 1)"
          echo "run_status=$run_status" >> "$GITHUB_OUTPUT"

      - name: Build and verify all pages
        if: steps.calculate.outputs.run_status == 'success'
        working-directory: industry_insight_sandbox
        run: npm test

      - name: Publish live webpage data
        if: steps.calculate.outputs.run_status == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          publish_dir="$(mktemp -d)"
          cp industry_insight_sandbox/data/overview.json "$publish_dir/overview.json"
          cp industry_insight_sandbox/data/all_topics.json "$publish_dir/all_topics.json"
          cp -R industry_insight_sandbox/data/topics "$publish_dir/topics"
          cd "$publish_dir"
          git init
          git checkout -b etf-watch-data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "data: update ETF watch for ${WORKFLOW_END_DATE:-latest}"
          auth_header="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w 0)"
          git -c "http.extraheader=AUTHORIZATION: basic $auth_header" \
            push --force "https://github.com/${GITHUB_REPOSITORY}.git" \
            HEAD:refs/heads/etf-watch-data

      - name: Pull Vercel production environment
        if: steps.calculate.outputs.run_status == 'success'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel deployment
        if: steps.calculate.outputs.run_status == 'success'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx --yes vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy observation site to Vercel
        if: steps.calculate.outputs.run_status == 'success'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx --yes vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Upload workflow logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-constituent-workflow-logs
          path: logs/etf_constituent_workflow

      - name: Upload observation snapshot
        if: steps.calculate.outputs.run_status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: etf-constituent-observation-${{ github.run_id }}
          path: |
            industry_insight_sandbox/data/overview.json
            industry_insight_sandbox/data/all_topics.json
            industry_insight_sandbox/data/topics
            industry_insight_sandbox/dist

      - name: Send Feishu webhook
        if: always()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.Theme_Watch_FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.Theme_Watch_FEISHU_WEBHOOK_SECRET }}
          FEISHU_WEBHOOK_KEYWORD: theme_watch
          ETF_WATCH_SITE_URL: https://etf-core-constituent-watch.vercel.app
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_JOB_STATUS: ${{ job.status }}
        run: |
          python etf_constituent_feishu_webhook.py \
            --summary-dir logs/etf_constituent_workflow \
            --overview-path industry_insight_sandbox/data/overview.json \
            --require-webhook

      - name: Save market data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: industry_insight_sandbox/data/cache
          key: etf-constituent-cache-v1-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
